<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BD Dine Restaurant</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <div style="max-width: 400px; margin: 30px auto; padding: 0 20px;">
        <div class="text-center mb-4">
            <div style="font-size: 3rem; color: var(--accent-primary); margin-bottom: var(--spacing-sm);">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Admin Access</h2>
            <p style="color: var(--text-secondary);">Secure authentication required</p>
        </div>

        <form id="admin-login-form">
            <div id="step-1" class="login-step active">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="admin" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-lock"></i> Secure Login
                </button>
            </div>

            <div id="step-2" class="login-step">
                <div class="form-group">
                    <label class="form-label">2FA Verification Code</label>
                    <input type="text" name="code" class="form-input" placeholder="000000" maxlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Verify</button>
            </div>
        </form>

        <div class="mt-4 text-center">
            <p class="mt-2">
                <a href="login.html" style="font-size: 0.9rem;">
                    <i class="fas fa-user"></i> Customer Login
                    </a>
            </p>
        </div>
    </div>
<script>
// Hide step 2 initially
document.getElementById('step-2').style.display = 'none';

let adminId = null;

document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    
    if (step2.style.display === 'none') {
        // Step 1: username + password
        const username = this.username.value;
        const password = this.password.value;
        
        const submitBtn = this.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Authenticating...';
        
        try {
            const response = await fetch('/secure-restaurant-ordering-and-table-management-system/bd-dine/api/admin-login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (data.success && data.requires_2fa) {
                adminId = data.admin_id;
                step1.style.display = 'none';
                step2.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verify';
                showToast('2FA code sent to admin email!', 'info');
            } else {
                showToast(data.message || 'Login failed', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-lock"></i> Secure Login';
            }
        } catch (error) {
            showToast('Connection error', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-lock"></i> Secure Login';
        }
        
    } else {
        // Step 2: verify 2FA
        const code = this.code.value;
        
        const submitBtn = this.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Verifying...';
        
        try {
            const response = await fetch('/secure-restaurant-ordering-and-table-management-system/bd-dine/api/verify-2fa.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admin_id: adminId, code: code })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('Login successful!', 'success');
                setTimeout(() => window.location.href = 'admin-dashboard.html', 1500);
            } else {
                showToast(data.message || 'Invalid code', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verify';
            }
        } catch (error) {
            showToast('Connection error', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Verify';
        }
    }
});
</script>
<script src="js/main.js"></script>
</body>
</html>
